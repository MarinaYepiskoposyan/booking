name: CD — Deploy to Google Cloud Run

on:
  push:
    branches: [master]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGION: us-central1
  PROJECT_ID: booking-app-free-2026
  REGISTRY: us-central1-docker.pkg.dev/booking-app-free-2026/booking

jobs:
  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend image
        id: meta
        env:
          IMAGE: ${{ env.REGISTRY }}/backend:${{ github.sha }}
        run: |
          docker build \
            --tag "$IMAGE" \
            ./booking-backend
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push frontend image
        id: meta
        env:
          IMAGE: ${{ env.REGISTRY }}/frontend:${{ github.sha }}
        run: |
          docker build \
            --tag "$IMAGE" \
            ./booking-frontend
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy-backend:
    name: Deploy Backend to Cloud Run
    needs: build-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: booking-backend
          region: us-central1
          image: ${{ needs.build-backend.outputs.image }}
          flags: >
            --port=8080
            --allow-unauthenticated
            --add-cloudsql-instances=booking-app-free-2026:us-central1:booking-mysql
            --memory=512Mi
            --cpu=1
          env_vars: |
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SPRING_DATASOURCE_URL=jdbc:mysql:///bookingdb?cloudSqlInstance=booking-app-free-2026:us-central1:booking-mysql&socketFactory=com.google.cloud.sql.mysql.SocketFactory&user=${{ secrets.DB_USERNAME }}&password=${{ secrets.DB_PASSWORD }}
            SERVER_PORT=8080
            SPRING_JPA_HIBERNATE_DDL_AUTO=validate

  deploy-frontend:
    name: Deploy Frontend to Cloud Run
    needs: [build-frontend, deploy-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe booking-backend \
            --region=us-central1 \
            --project=booking-app-free-2026 \
            --format="value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: booking-frontend
          region: us-central1
          image: ${{ needs.build-frontend.outputs.image }}
          flags: >
            --port=80
            --allow-unauthenticated
            --memory=256Mi
          env_vars: |
            BACKEND_URL=${{ steps.backend-url.outputs.url }}
