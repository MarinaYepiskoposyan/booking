<div class="form-container">
  <h2>Add New Service</h2>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Service Name *</label>
      <input formControlName="name" placeholder="e.g. Haircut, Consultation">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea formControlName="description" rows="3"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Duration (minutes) *</label>
        <input formControlName="durationMinutes" type="number" min="1">
      </div>
      <div class="form-group">
        <label>Price *</label>
        <input formControlName="price" type="number" min="0.01" step="0.01">
      </div>
      <div class="form-group">
        <label>Currency</label>
        <select formControlName="currency">
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="GBP">GBP</option>
        </select>
      </div>
    </div>
    <div class="error" *ngIf="error">{{ error }}</div>
    <button type="submit" [disabled]="loading">{{ loading ? 'Saving...' : 'Add Service' }}</button>
    <a routerLink="/provider/services">Cancel</a>
  </form>
</div>
