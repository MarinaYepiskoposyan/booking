<div class="page-wrapper">
  <div class="page-header">
    <h1>Edit Service</h1>
    <p>Update the details of this service</p>
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="service-form">

      <div class="form-group">
        <label class="form-label" for="es-name">Service Name <span class="required">*</span></label>
        <input
          id="es-name"
          formControlName="name"
          class="form-input"
          placeholder="e.g. Haircut, Consultation, Deep Tissue Massage"
        >
        <span class="error-text" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
          Service name is required
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="es-desc">Description <span class="optional">optional</span></label>
        <textarea
          id="es-desc"
          formControlName="description"
          class="form-input"
          rows="3"
          placeholder="Describe what's included in this service..."
        ></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="es-duration">Duration <span class="required">*</span></label>
          <div class="input-suffix-wrap">
            <input
              id="es-duration"
              formControlName="durationMinutes"
              type="number"
              min="1"
              class="form-input suffixed"
              placeholder="60"
            >
            <span class="input-suffix">min</span>
          </div>
          <span class="error-text" *ngIf="form.get('durationMinutes')?.invalid && form.get('durationMinutes')?.touched">
            Duration must be at least 1 minute
          </span>
        </div>

        <div class="form-group">
          <label class="form-label" for="es-price">Price <span class="required">*</span></label>
          <div class="price-row">
            <select formControlName="currency" class="form-input currency-select">
              <option value="USD">USD $</option>
              <option value="EUR">EUR &euro;</option>
              <option value="GBP">GBP &pound;</option>
            </select>
            <input
              id="es-price"
              formControlName="price"
              type="number"
              min="0.01"
              step="0.01"
              class="form-input price-input"
              placeholder="0.00"
            >
          </div>
          <span class="error-text" *ngIf="form.get('price')?.invalid && form.get('price')?.touched">
            Price must be greater than 0
          </span>
        </div>
      </div>

      <div class="alert-error" *ngIf="error">{{ error }}</div>

      <div class="form-actions">
        <a routerLink="/provider/services" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-primary" [disabled]="loading">
          <span *ngIf="!loading">Save Changes</span>
          <span *ngIf="loading" class="spinner-wrap">
            <span class="spinner"></span> Saving...
          </span>
        </button>
      </div>

    </form>
  </div>
</div>
