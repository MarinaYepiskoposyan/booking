<div class="auth-container">
  <h2>Sign In</h2>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Email</label>
      <input formControlName="email" type="email" placeholder="Email address">
      <span class="error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
        Valid email is required
      </span>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input formControlName="password" type="password" placeholder="Password">
      <span class="error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
        Password is required
      </span>
    </div>
    <div class="error" *ngIf="error">{{ error }}</div>
    <button type="submit" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>
    <p>No account yet? <a routerLink="/register">Register</a></p>
  </form>
</div>
