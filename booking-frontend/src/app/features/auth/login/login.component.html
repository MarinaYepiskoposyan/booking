<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">B</div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your Bookify account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="login-email">Email address</label>
        <input
          id="login-email"
          formControlName="email"
          type="email"
          class="form-input"
          placeholder="you@example.com"
          autocomplete="email"
        >
        <span class="error-text" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Please enter a valid email address
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input
          id="login-password"
          formControlName="password"
          type="password"
          class="form-input"
          placeholder="Your password"
          autocomplete="current-password"
        >
        <span class="error-text" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Password is required
        </span>
      </div>

      <div class="alert-error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading" class="spinner-wrap">
          <span class="spinner"></span> Signing in...
        </span>
      </button>
    </form>

    <p class="auth-switch">
      Don't have an account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
