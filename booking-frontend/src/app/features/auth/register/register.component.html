<div class="auth-container">
  <h2>Create Account</h2>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input formControlName="firstName" placeholder="First name">
        <span class="error" *ngIf="form.get('firstName')?.invalid && form.get('firstName')?.touched">
          First name is required
        </span>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input formControlName="lastName" placeholder="Last name">
        <span class="error" *ngIf="form.get('lastName')?.invalid && form.get('lastName')?.touched">
          Last name is required
        </span>
      </div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input formControlName="email" type="email" placeholder="Email address">
      <span class="error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
        Valid email is required
      </span>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input formControlName="password" type="password" placeholder="Password (min 8 chars)">
      <span class="error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
        Password must be at least 8 characters
      </span>
    </div>
    <div class="form-group">
      <label>Phone (optional)</label>
      <input formControlName="phone" placeholder="Phone number">
    </div>
    <div class="form-group">
      <label>I am a</label>
      <select formControlName="role">
        <option value="CLIENT">Client — I want to book services</option>
        <option value="PROVIDER">Provider — I offer services</option>
      </select>
    </div>
    <div class="error" *ngIf="error">{{ error }}</div>
    <button type="submit" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Create Account' }}
    </button>
    <p>Already have an account? <a routerLink="/login">Login</a></p>
  </form>
</div>
