<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">B</div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Join Bookify — it only takes a minute</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="reg-firstname">First Name</label>
          <input
            id="reg-firstname"
            formControlName="firstName"
            class="form-input"
            placeholder="Jane"
            autocomplete="given-name"
          >
          <span class="error-text" *ngIf="form.get('firstName')?.invalid && form.get('firstName')?.touched">
            First name is required
          </span>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-lastname">Last Name</label>
          <input
            id="reg-lastname"
            formControlName="lastName"
            class="form-input"
            placeholder="Smith"
            autocomplete="family-name"
          >
          <span class="error-text" *ngIf="form.get('lastName')?.invalid && form.get('lastName')?.touched">
            Last name is required
          </span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-email">Email address</label>
        <input
          id="reg-email"
          formControlName="email"
          type="email"
          class="form-input"
          placeholder="you@example.com"
          autocomplete="email"
        >
        <span class="error-text" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Please enter a valid email address
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <input
          id="reg-password"
          formControlName="password"
          type="password"
          class="form-input"
          placeholder="At least 8 characters"
          autocomplete="new-password"
        >
        <span class="error-text" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Password must be at least 8 characters
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-phone">Phone <span class="optional">optional</span></label>
        <input
          id="reg-phone"
          formControlName="phone"
          class="form-input"
          placeholder="+1 (555) 000-0000"
          autocomplete="tel"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="reg-role">I am a</label>
        <select id="reg-role" formControlName="role" class="form-input">
          <option value="CLIENT">Client — I want to book services</option>
          <option value="PROVIDER">Provider — I offer services</option>
        </select>
      </div>

      <div class="alert-error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Create Account</span>
        <span *ngIf="loading" class="spinner-wrap">
          <span class="spinner"></span> Creating account...
        </span>
      </button>
    </form>

    <p class="auth-switch">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
