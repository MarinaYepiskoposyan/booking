<div class="page-wrapper">
  <div class="page-header">
    <h1>Edit Profile</h1>
    <p>Update your personal information</p>
  </div>

  <div class="card">
    <div class="alert-success" *ngIf="success">
      <span class="success-icon">&#10003;</span>
      Profile updated successfully! Redirecting...
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="profile-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="ep-firstname">First Name</label>
          <input
            id="ep-firstname"
            formControlName="firstName"
            class="form-input"
            placeholder="First name"
            autocomplete="given-name"
          >
          <span class="error-text" *ngIf="form.get('firstName')?.invalid && form.get('firstName')?.touched">
            First name is required
          </span>
        </div>
        <div class="form-group">
          <label class="form-label" for="ep-lastname">Last Name</label>
          <input
            id="ep-lastname"
            formControlName="lastName"
            class="form-input"
            placeholder="Last name"
            autocomplete="family-name"
          >
          <span class="error-text" *ngIf="form.get('lastName')?.invalid && form.get('lastName')?.touched">
            Last name is required
          </span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="ep-phone">Phone <span class="optional">optional</span></label>
        <input
          id="ep-phone"
          formControlName="phone"
          class="form-input"
          placeholder="+1 (555) 000-0000"
          autocomplete="tel"
        >
      </div>

      <div class="alert-error" *ngIf="error">{{ error }}</div>

      <div class="form-actions">
        <a routerLink="/profile" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>
